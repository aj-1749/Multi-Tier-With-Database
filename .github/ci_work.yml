name: End-to-End DevSecOps CI/CD (Local KIND)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: hello8989/bankapp
  K8S_CONTEXT: kind-dev-cluster

jobs:

# ==================================================
# 1️⃣ BUILD & COMPILE
# ==================================================
  compile:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Compile
        run: mvn clean compile


# ==================================================
# 2️⃣ STATIC SECURITY SCANS
# ==================================================
  security_scan:
    runs-on: self-hosted
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        run: trivy fs . --severity HIGH,CRITICAL --exit-code 0

      - name: Gitleaks Secret Scan
        run: gitleaks detect source . --report-format json --report-path gitleaks-report.json


# ==================================================
# 3️⃣ UNIT TESTS
# ==================================================
  test:
    runs-on: self-hosted
    needs: security_scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test


# ==================================================
# 4️⃣ SONARCLOUD ANALYSIS
# ==================================================
  sonarcloud:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io


# ==================================================
# 5️⃣ DOCKER BUILD + IMAGE SCAN + PUSH
# ==================================================
  docker_build:
    runs-on: self-hosted
    needs: sonarcloud
    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Trivy Image Scan
        run: trivy image $IMAGE_NAME:latest --severity HIGH,CRITICAL --exit-code 0

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest


# ==================================================
# 6️⃣ DEPLOY TO LOCAL KIND K8S
# ==================================================
  deploy_kind:
    runs-on: self-hosted
    needs: docker_build
    steps:
      - uses: actions/checkout@v4

      - name: Set Kubernetes Context
        run: kubectl config use-context $K8S_CONTEXT

      - name: Update Image Tag
        run: |
          sed -i "s|hello8989/bankapp:latest|hello8989/bankapp:${{ github.sha }}|g" ds.yml

      - name: Deploy to KIND
        run: kubectl apply -f ds.yml

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/bankapp
          kubectl get pods
          kubectl get svc
