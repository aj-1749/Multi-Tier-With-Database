name: DevSecOps CI/CD Pipeline (KIND)

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: hello8989/bankapp
  K8S_CONTEXT: kind-dev-cluster

jobs:

# ===============================
# 1. BUILD
# ===============================
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn clean compile

# ===============================
# 2. SECURITY SCAN
# ===============================
  security:
    runs-on: self-hosted
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS Scan
        run: trivy fs . --severity HIGH,CRITICAL --exit-code 0

      - name: Gitleaks Scan
        run: gitleaks detect --source . --report-path gitleaks.json

# ===============================
# 3. TEST
# ===============================
  test:
    runs-on: self-hosted
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Run Tests
        run: mvn test

# ===============================
# 4. SONAR
# ===============================
  sonar:
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Scan
        run: |
          mvn verify sonar:sonar \
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
          -Dsonar.organization=${{ vars.SONAR_ORG }} \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

# ===============================
# 5. DOCKER BUILD
# ===============================
  docker:
    runs-on: self-hosted
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
             -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Scan Image
        run: trivy image $IMAGE_NAME:latest --severity HIGH,CRITICAL --exit-code 0

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

# ===============================
# 6. DEPLOY TO KIND
# ===============================
  deploy:
    runs-on: self-hosted
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Set K8s Context
        run: kubectl config use-context $K8S_CONTEXT

      - name: Update Image
        run: |
          sed -i "s|hello8989/bankapp:latest|$IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yml

      - name: Deploy
        run: kubectl apply -f k8s/deployment.yml

      - name: Wait for MySQL
        run: kubectl rollout status deployment/mysql

      - name: Wait for App
        run: kubectl rollout status deployment/bankapp

      - name: Verify
        run: |
          kubectl get pods
          kubectl get svc
